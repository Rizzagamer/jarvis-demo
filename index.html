<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>J.A.R.V.I.S.</title>
<style>
  :root{
    --bg-0:#03070a;
    --bg-1:#060e14;
    --core:#4fd8ff;
    --core-dim:#0f5b73;
    --amber:#ffb454;
    --danger:#ff5c5c;
    --text-hi:#eaf6fb;
    --text-lo:#7fa8b8;
    --mono: 'SF Mono', 'Roboto Mono', ui-monospace, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; height:100%;
    background:radial-gradient(ellipse at 50% 20%, var(--bg-1), var(--bg-0) 70%);
    color:var(--text-hi);
    font-family:var(--sans);
    overflow:hidden;
    -webkit-user-select:none; user-select:none;
  }
  #app{
    height:100dvh;
    display:flex;
    flex-direction:column;
    padding: max(18px, env(safe-area-inset-top)) 18px max(18px, env(safe-area-inset-bottom));
    position:relative;
  }

  /* scanline / grid backdrop */
  #grid{
    position:fixed; inset:0; pointer-events:none; opacity:.35;
    background-image:
      linear-gradient(rgba(79,216,255,.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,216,255,.05) 1px, transparent 1px);
    background-size: 34px 34px;
    mask-image: radial-gradient(ellipse at 50% 40%, black 10%, transparent 75%);
  }

  header{
    display:flex; justify-content:space-between; align-items:flex-start;
    font-family:var(--mono); font-size:11px; letter-spacing:2px;
    color:var(--text-lo); z-index:2;
  }
  header .brand{ color:var(--core); font-weight:600; }
  header .status-dot{
    display:inline-block; width:6px; height:6px; border-radius:50%;
    background:var(--core); margin-right:6px;
    box-shadow:0 0 8px var(--core);
    animation: blink 2s infinite;
  }
  @keyframes blink{ 0%,100%{opacity:1} 50%{opacity:.3} }
  header .clock{ text-align:right; }

  #settings-btn{
    background:none; border:1px solid var(--core-dim); border-radius:50%;
    width:30px; height:30px; display:flex; align-items:center; justify-content:center;
    color:var(--core); flex-shrink:0; margin-left:10px;
  }
  #settings-btn svg{ width:15px; height:15px; }
  #settings-btn path{ fill:var(--core); }

  #settings-panel{
    display:none; position:fixed; inset:0; z-index:20;
    background:rgba(3,7,10,.94); backdrop-filter: blur(4px);
    align-items:center; justify-content:center; padding:24px;
  }
  #settings-panel.open{ display:flex; }
  #settings-card{
    width:100%; max-width:380px; background:var(--bg-1);
    border:1px solid var(--core-dim); border-radius:14px; padding:22px;
    font-family:var(--mono);
  }
  #settings-card h3{
    margin:0 0 14px; font-size:12px; letter-spacing:2px; color:var(--core);
    text-transform:uppercase; font-weight:600;
  }
  #voice-select{
    width:100%; background:#04090c; border:1.5px solid var(--core-dim);
    border-radius:10px; padding:10px 12px; color:var(--text-hi);
    font-family:var(--sans); font-size:14px; margin-bottom:14px;
  }
  .settings-row{ display:flex; gap:10px; }
  .settings-row button{
    flex:1; padding:11px; border-radius:10px; border:1px solid var(--core-dim);
    background:transparent; color:var(--core); font-family:var(--sans);
    font-size:13px; font-weight:600;
  }
  .settings-row button.primary{ background:var(--core); color:#03070a; }
  #settings-hint{ font-size:10.5px; color:var(--text-lo); margin-top:12px; line-height:1.5; letter-spacing:.5px; }
  #name-input{
    width:100%; background:#04090c; border:1.5px solid var(--core-dim);
    border-radius:10px; padding:10px 12px; color:var(--text-hi);
    font-family:var(--sans); font-size:14px; margin-bottom:14px;
  }

  #start-overlay{
    position:fixed; inset:0; z-index:30;
    background:radial-gradient(ellipse at 50% 30%, var(--bg-1), var(--bg-0) 70%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:22px; text-align:center; padding:30px;
  }
  #start-overlay.hidden{ display:none; }
  #start-overlay .brand{
    font-family:var(--mono); letter-spacing:4px; color:var(--core);
    font-size:15px; font-weight:600;
  }
  #start-btn{
    width:96px; height:96px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #0d222a, #04090c 70%);
    border:1.5px solid var(--core);
    box-shadow:0 0 24px rgba(79,216,255,.25);
    display:flex; align-items:center; justify-content:center;
    animation: pulse 2.4s ease-in-out infinite;
  }
  #start-btn svg{ width:34px; height:34px; }
  #start-btn path{ fill:var(--core); }
  #start-overlay .hint2{
    font-family:var(--mono); font-size:10.5px; letter-spacing:1.5px;
    color:var(--text-lo); text-transform:uppercase;
  }

  main{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    position:relative; z-index:2;
  }

  #core-wrap{
    position:relative; width:min(62vw, 280px); height:min(62vw,280px);
    display:flex; align-items:center; justify-content:center;
    margin-bottom: 22px;
  }
  svg#core{ width:100%; height:100%; overflow:visible; }
  .ring{ fill:none; stroke:var(--core-dim); transform-origin:50% 50%; }
  .ring-active{ stroke:var(--core); filter:drop-shadow(0 0 6px var(--core)); }
  #ringA{ animation: spin 14s linear infinite; }
  #ringB{ animation: spin 9s linear infinite reverse; }
  #ringC{ animation: spin 22s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  #nucleus{
    fill: var(--core);
    filter: drop-shadow(0 0 14px var(--core)) drop-shadow(0 0 30px var(--core));
    transform-origin:50% 50%;
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{ transform:scale(1); opacity:.9 } 50%{ transform:scale(1.14); opacity:1 } }

  #app.state-listening #nucleus{ animation: pulse 0.9s ease-in-out infinite; fill:var(--amber); filter:drop-shadow(0 0 16px var(--amber)) drop-shadow(0 0 34px var(--amber)); }
  #app.state-listening .ring-active{ stroke:var(--amber); filter:drop-shadow(0 0 6px var(--amber)); }
  #app.state-thinking #ringA{ animation-duration: 1.6s; }
  #app.state-thinking #ringB{ animation-duration: 1s; }
  #app.state-thinking #ringC{ animation-duration: 2.2s; }
  #app.state-error #nucleus{ fill:var(--danger); filter:drop-shadow(0 0 16px var(--danger)); }

  #status-label{
    font-family:var(--mono); font-size:12px; letter-spacing:4px; text-transform:uppercase;
    color:var(--core); text-align:center; min-height:16px;
  }
  #app.state-listening #status-label{ color:var(--amber); }
  #app.state-error #status-label{ color:var(--danger); }

  #transcript{
    width:100%; max-width:480px; margin-top:18px;
    text-align:center; font-size:16px; line-height:1.5; color:var(--text-hi);
    min-height:70px; max-height:22vh; overflow-y:auto; padding:0 6px;
  }
  #transcript .you{ color:var(--text-lo); font-size:13px; font-family:var(--mono); margin-top:10px; }
  #transcript .jarvis{ color:var(--text-hi); }

  footer{
    z-index:2; display:flex; flex-direction:column; align-items:center; gap:14px;
    padding-top:10px;
  }
  #mic-btn{
    width:84px; height:84px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #0d222a, #04090c 70%);
    border:1.5px solid var(--core-dim);
    display:flex; align-items:center; justify-content:center;
    position:relative;
    transition: border-color .2s, box-shadow .2s, transform .15s;
    box-shadow:0 0 0 0 rgba(79,216,255,0);
  }
  #mic-btn:active{ transform:scale(.94); }
  #mic-btn.listening{
    border-color:var(--amber);
    box-shadow:0 0 0 10px rgba(255,180,84,.08), 0 0 24px rgba(255,180,84,.35);
  }
  #mic-btn svg{ width:30px; height:30px; }
  #mic-btn path, #mic-btn rect{ fill:var(--core); }
  #mic-btn.listening path, #mic-btn.listening rect{ fill:var(--amber); }

  #hint{
    font-family:var(--mono); font-size:10.5px; letter-spacing:1.5px;
    color:var(--text-lo); text-transform:uppercase; text-align:center;
  }

  #text-form{
    display:none; width:100%; max-width:420px;
    align-items:center; gap:10px;
  }
  #text-form.active{ display:flex; }
  #text-input{
    flex:1; background:#04090c; border:1.5px solid var(--core-dim);
    border-radius:22px; padding:12px 16px; color:var(--text-hi);
    font-family:var(--sans); font-size:15px; outline:none;
  }
  #text-input:focus{ border-color:var(--core); }
  #text-input::placeholder{ color:var(--text-lo); }
  #send-btn{
    width:44px; height:44px; border-radius:50%; flex-shrink:0;
    background:radial-gradient(circle at 35% 30%, #0d222a, #04090c 70%);
    border:1.5px solid var(--core-dim);
    display:flex; align-items:center; justify-content:center;
  }
  #send-btn:active{ transform:scale(.92); }
  #send-btn svg{ width:18px; height:18px; }
  #send-btn path{ fill:var(--core); }
</style>
</head>
<body>
<div id="grid"></div>
<div id="start-overlay">
  <div class="brand">J.A.R.V.I.S.</div>
  <button id="start-btn" aria-label="Inicializar sistema">
    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
  </button>
  <div class="hint2">Toque para inicializar</div>
</div>

<div id="app" class="state-idle">
  <header>
    <div><span class="status-dot"></span><span class="brand">J.A.R.V.I.S.</span><br><span id="mode-label">SISTEMA EM ESPERA</span></div>
    <div style="display:flex; align-items:flex-start;">
      <div class="clock" id="clock">00:00:00</div>
      <button id="settings-btn" aria-label="Configurações de voz">
        <svg viewBox="0 0 24 24"><path d="M19.14 12.94a7.14 7.14 0 000-1.88l2.03-1.58a.5.5 0 00.12-.64l-1.92-3.32a.5.5 0 00-.6-.22l-2.39.96a7.1 7.1 0 00-1.63-.94l-.36-2.54a.5.5 0 00-.5-.42h-3.84a.5.5 0 00-.5.42l-.36 2.54c-.59.24-1.13.56-1.63.94l-2.39-.96a.5.5 0 00-.6.22L2.7 8.84a.5.5 0 00.12.64l2.03 1.58a7.14 7.14 0 000 1.88l-2.03 1.58a.5.5 0 00-.12.64l1.92 3.32c.14.24.42.32.6.22l2.39-.96c.5.38 1.04.7 1.63.94l.36 2.54c.05.24.26.42.5.42h3.84c.24 0 .45-.18.5-.42l.36-2.54c.59-.24 1.13-.56 1.63-.94l2.39.96c.24.1.46.02.6-.22l1.92-3.32a.5.5 0 00-.12-.64l-2.03-1.58zM12 15.5A3.5 3.5 0 1112 8.5a3.5 3.5 0 010 7z"/></svg>
      </button>
    </div>
  </header>

  <div id="settings-panel">
    <div id="settings-card">
      <h3>Voz do sistema</h3>
      <select id="voice-select"></select>
      <h3 style="margin-top:16px;">Seu nome</h3>
      <input id="name-input" type="text" placeholder="Ex: Isaac" autocomplete="off">
      <div class="settings-row">
        <button id="test-voice-btn" type="button">Testar</button>
        <button id="close-settings-btn" type="button" class="primary">Pronto</button>
      </div>
      <div id="settings-hint">A lista de vozes muda de aparelho para aparelho. Teste aqui antes de apresentar e escolha a que soar melhor no celular/computador que você vai usar.</div>
    </div>
  </div>

  <main>
    <div id="core-wrap">
      <svg id="core" viewBox="0 0 200 200">
        <circle id="ringC" class="ring ring-active" cx="100" cy="100" r="92" stroke-width="1" stroke-dasharray="4 10"/>
        <circle id="ringA" class="ring ring-active" cx="100" cy="100" r="76" stroke-width="1.5" stroke-dasharray="2 6"/>
        <circle id="ringB" class="ring" cx="100" cy="100" r="60" stroke-width="1" stroke-dasharray="1 4"/>
        <circle id="nucleus" cx="100" cy="100" r="30"/>
      </svg>
    </div>
    <div id="status-label">PRONTO</div>
    <div id="transcript"></div>
  </main>

  <footer>
    <button id="mic-btn" aria-label="Falar com Jarvis">
      <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg>
    </button>

    <form id="text-form">
      <input id="text-input" type="text" placeholder="Toque e use o mic do teclado, ou digite" autocomplete="off" autocapitalize="sentences">
      <button id="send-btn" type="submit" aria-label="Enviar">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </form>

    <div id="hint">Toque e fale</div>
  </footer>
</div>

<script>
(function(){
  const app = document.getElementById('app');
  const micBtn = document.getElementById('mic-btn');
  const statusLabel = document.getElementById('status-label');
  const modeLabel = document.getElementById('mode-label');
  const transcript = document.getElementById('transcript');
  const clockEl = document.getElementById('clock');
  const hint = document.getElementById('hint');
  const textForm = document.getElementById('text-form');
  const textInput = document.getElementById('text-input');
  const settingsBtn = document.getElementById('settings-btn');
  const settingsPanel = document.getElementById('settings-panel');
  const voiceSelect = document.getElementById('voice-select');
  const testVoiceBtn = document.getElementById('test-voice-btn');
  const closeSettingsBtn = document.getElementById('close-settings-btn');
  const nameInput = document.getElementById('name-input');
  const startOverlay = document.getElementById('start-overlay');
  const startBtn = document.getElementById('start-btn');

  // clock
  function tick(){
    const d = new Date();
    clockEl.textContent = d.toLocaleTimeString('pt-BR', {hour12:false});
  }
  tick(); setInterval(tick, 1000);

  function setState(s, label){
    app.className = 'state-' + s;
    statusLabel.textContent = label;
    modeLabel.textContent = ({
      idle: 'SISTEMA EM ESPERA',
      listening: 'CAPTURANDO ÁUDIO',
      thinking: 'PROCESSANDO',
      speaking: 'RESPONDENDO',
      error: 'FALHA DE SISTEMA'
    })[s] || '';
  }

  function addLine(cls, text){
    const p = document.createElement('div');
    p.className = cls;
    p.textContent = text;
    transcript.appendChild(p);
    transcript.scrollTop = transcript.scrollHeight;
    return p;
  }

  // ---- Speech recognition setup ----
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognizing = false;
  let recognition = null;

  if (!SR) {
    // iOS Safari (and some others) don't support speech-to-text.
    // Fall back to a text field; replies are still spoken aloud (TTS works fine on iOS).
    micBtn.style.display = 'none';
    textForm.classList.add('active');
    hint.textContent = 'Toque no campo e use o microfone do teclado';

    textForm.addEventListener('submit', function(e){
      e.preventDefault();
      const val = textInput.value.trim();
      if (!val) return;
      addLine('you', '> ' + val);
      textInput.value = '';
      textInput.blur();
      setState('thinking', 'PROCESSANDO...');
      const reply = getLocalResponse(val);
      addLine('jarvis', reply);
      // chamada de voz DIRETA e síncrona aqui dentro do handler de toque —
      // no iPhone, qualquer await/setTimeout antes disso faz o Safari bloquear o áudio.
      speak(reply);
    });
  } else {
    recognition = new SR();
    recognition.lang = 'pt-BR';
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    recognition.onstart = function(){
      recognizing = true;
      micBtn.classList.add('listening');
      setState('listening', 'OUVINDO...');
    };

    recognition.onerror = function(e){
      recognizing = false;
      micBtn.classList.remove('listening');
      setState('error', 'ERRO: ' + (e.error || 'DESCONHECIDO'));
      setTimeout(()=> setState('idle','PRONTO'), 2200);
    };

    recognition.onend = function(){
      recognizing = false;
      micBtn.classList.remove('listening');
    };

    recognition.onresult = function(e){
      const said = e.results[0][0].transcript;
      addLine('you', '> ' + said);
      setState('thinking', 'PROCESSANDO...');
      const reply = getLocalResponse(said);
      addLine('jarvis', reply);
      speak(reply);
    };
  }

  micBtn.addEventListener('click', function(){
    if (!SR) return;
    if (recognizing) { recognition.stop(); return; }

    if (!window.isSecureContext) {
      setState('error', 'ABRA VIA HTTP, NÃO ARQUIVO');
      addLine('jarvis', 'O microfone só funciona se a página for aberta por um endereço http:// ou https:// — abrir o arquivo direto (duplo clique) bloqueia o acesso ao microfone no navegador.');
      setTimeout(()=> setState('idle','PRONTO'), 4000);
      return;
    }

    // cancel any speech before listening
    window.speechSynthesis.cancel();
    try {
      recognition.start();
    } catch(e){
      if (e && e.name === 'InvalidStateError') return; // already started, ignore
      setState('error', 'ERRO AO INICIAR: ' + (e && e.message ? e.message : e));
      setTimeout(()=> setState('idle','PRONTO'), 3000);
    }
  });

  // ---- Text-to-speech ----
  let ttsUnlocked = false;
  function unlockTTS(){
    if (ttsUnlocked || !window.speechSynthesis) return;
    ttsUnlocked = true;
    // iOS Safari needs a speak() call to happen inside a real user gesture
    // before any later, async-triggered speak() will actually produce sound.
    const warm = new SpeechSynthesisUtterance(' ');
    warm.volume = 1;
    window.speechSynthesis.speak(warm);
  }
  document.body.addEventListener('touchstart', unlockTTS, {once:true, passive:true});
  document.body.addEventListener('click', unlockTTS, {once:true});

  // ---- Nome do usuário (salvo no navegador) ----
  let selectedVoiceURI = null;
  function getUserName(){
    return (localStorage.getItem('jarvis-name') || '').trim();
  }
  nameInput.value = getUserName();
  nameInput.addEventListener('input', ()=>{
    localStorage.setItem('jarvis-name', nameInput.value.trim());
  });

  function getGreeting(){
    const h = new Date().getHours();
    const saudacao = h < 12 ? 'Bom dia' : (h < 18 ? 'Boa tarde' : 'Boa noite');
    const name = getUserName();
    const namePart = name ? ', ' + name : '';
    return `${saudacao}${namePart}. Sistemas online e operando normalmente. Como posso ajudar?`;
  }

  // ---- Tela inicial: um único toque libera o áudio no iPhone E dispara a saudação ----
  startBtn.addEventListener('click', ()=>{
    startOverlay.classList.add('hidden');
    setState('thinking', 'PROCESSANDO...');
    const greeting = getGreeting();
    addLine('jarvis', greeting);
    speak(greeting); // chamada síncrona dentro do toque - funciona no iPhone
  });

  // restaura preferência de voz salva
  if (localStorage.getItem('jarvis-voice')) {
    selectedVoiceURI = localStorage.getItem('jarvis-voice');
  }

  function populateVoiceList(){
    const voices = window.speechSynthesis.getVoices() || [];
    if (!voices.length) return;
    const current = voiceSelect.value;
    voiceSelect.innerHTML = '';
    // português primeiro, depois o resto, caso o aparelho não tenha nenhuma em pt
    const pt = voices.filter(v => v.lang && v.lang.toLowerCase().startsWith('pt'));
    const rest = voices.filter(v => !(v.lang && v.lang.toLowerCase().startsWith('pt')));
    [...pt, ...rest].forEach(v => {
      const opt = document.createElement('option');
      opt.value = v.voiceURI;
      opt.textContent = v.name + ' (' + v.lang + ')';
      voiceSelect.appendChild(opt);
    });
    // restaura seleção anterior, ou pega a primeira em pt por padrão
    if (selectedVoiceURI && voices.some(v => v.voiceURI === selectedVoiceURI)) {
      voiceSelect.value = selectedVoiceURI;
    } else if (pt.length) {
      voiceSelect.value = pt[0].voiceURI;
      selectedVoiceURI = pt[0].voiceURI;
    }
  }

  if (window.speechSynthesis) {
    populateVoiceList();
    window.speechSynthesis.onvoiceschanged = populateVoiceList;
  }

  voiceSelect.addEventListener('change', ()=>{
    selectedVoiceURI = voiceSelect.value;
    localStorage.setItem('jarvis-voice', selectedVoiceURI);
  });

  settingsBtn.addEventListener('click', ()=>{
    populateVoiceList();
    settingsPanel.classList.add('open');
  });
  closeSettingsBtn.addEventListener('click', ()=> settingsPanel.classList.remove('open'));
  testVoiceBtn.addEventListener('click', ()=> speak('Sistemas de voz operando normalmente. Como desejar.'));

  function speak(text){
    if (!window.speechSynthesis) { setState('idle','PRONTO'); return; }

    window.speechSynthesis.cancel();

    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'pt-BR';
    u.volume = 1;

    const voices = window.speechSynthesis.getVoices() || [];
    const chosenVoice = voices.find(v => v.voiceURI === selectedVoiceURI);
    if (chosenVoice) {
      u.voice = chosenVoice;
      // só grava o tom pra baixo se for uma voz que já parece masculina;
      // em voz feminina isso costuma soar distorcido.
      const maleNames = ['felipe','daniel','diego','ricardo','luiz','pedro','male','masculin'];
      const soundsMale = maleNames.some(n => chosenVoice.name.toLowerCase().includes(n));
      u.pitch = soundsMale ? 0.82 : 1.0;
      u.rate = 0.97;
    } else {
      u.pitch = 1.0;
      u.rate = 1.0;
    }

    let done = false;
    const finish = ()=>{
      if (done) return;
      done = true;
      clearTimeout(watchdog);
      setState('idle','PRONTO');
    };
    u.onstart = ()=> setState('speaking', 'RESPONDENDO');
    u.onend = finish;
    u.onerror = (ev)=>{
      // mostra o motivo real em vez de falhar em silêncio
      addLine('jarvis', '[voz indisponível: ' + (ev && ev.error ? ev.error : 'erro desconhecido') + ' — texto acima é a resposta]');
      finish();
    };

    // chamada síncrona - precisa acontecer AGORA, dentro do gesto do usuário
    window.speechSynthesis.speak(u);

    // rede de segurança: se nada acontecer em 6s, destrava a tela mesmo assim
    const watchdog = setTimeout(finish, 6000);
  }

  // ---- Motor de respostas local (funciona sem internet, ideal para apresentação) ----
  function normalize(s){
    return s.toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, ''); // remove acentos
  }

  function getLocalResponse(text){
    const q = normalize(text);
    const now = new Date();
    const timeStr = now.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});

    if (/que horas|hora atual|horario/.test(q)) {
      return `São ${timeStr}. Como desejar.`;
    }
    if (/status do sistema|status geral|como (voce|vc) esta/.test(q)) {
      return 'Todos os sistemas operacionais e nominais. Nenhuma anomalia detectada.';
    }
    if (/intelig[eê]?ncia artificial|o que e ia\b/.test(q)) {
      return 'Inteligência artificial é a capacidade de sistemas computacionais executarem tarefas que normalmente exigiriam raciocínio humano, como reconhecer padrões e tomar decisões. Considerado explicado.';
    }
    if (/hardware.*software|software.*hardware|diferenca entre hardware/.test(q)) {
      return 'Hardware é a parte física do computador, como processador e memória. Software é o conjunto de programas e instruções que rodam sobre esse hardware.';
    }
    if (/(^|\s)(oi|ola|opa)(\s|$)|tudo bem|bom dia|boa tarde|boa noite/.test(q)) {
      const name = getUserName();
      return `Olá${name ? ', ' + name : ''}. Estou operacional e pronto para ajudar. Como posso ser útil?`;
    }
    if (/quem e voce|seu nome|quem fala/.test(q)) {
      return 'Sou o JARVIS, assistente pessoal criado por Isaac Rizza. Ao seu dispor.';
    }
    if (/obrigad|valeu/.test(q)) {
      return 'Disponha. Estarei por aqui se precisar de mais alguma coisa.';
    }
    return 'Ainda estou calibrando meus sistemas para esse tipo de solicitação, mas já registrei o pedido. Considerado feito.';
  }


})();
