<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>J.A.R.V.I.S.</title>
<style>
  :root{
    --bg-0:#03070a;
    --bg-1:#060e14;
    --core:#4fd8ff;
    --core-dim:#0f5b73;
    --amber:#ffb454;
    --danger:#ff5c5c;
    --text-hi:#eaf6fb;
    --text-lo:#7fa8b8;
    --mono: 'SF Mono', 'Roboto Mono', ui-monospace, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; height:100%;
    background:radial-gradient(ellipse at 50% 20%, var(--bg-1), var(--bg-0) 70%);
    color:var(--text-hi);
    font-family:var(--sans);
    overflow:hidden;
    -webkit-user-select:none; user-select:none;
  }
  #app{
    height:100dvh;
    display:flex;
    flex-direction:column;
    padding: max(18px, env(safe-area-inset-top)) 18px max(18px, env(safe-area-inset-bottom));
    position:relative;
  }

  /* scanline / grid backdrop */
  #grid{
    position:fixed; inset:0; pointer-events:none; opacity:.35;
    background-image:
      linear-gradient(rgba(79,216,255,.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,216,255,.05) 1px, transparent 1px);
    background-size: 34px 34px;
    mask-image: radial-gradient(ellipse at 50% 40%, black 10%, transparent 75%);
  }

  header{
    display:flex; justify-content:space-between; align-items:flex-start;
    font-family:var(--mono); font-size:11px; letter-spacing:2px;
    color:var(--text-lo); z-index:2;
  }
  header .brand{ color:var(--core); font-weight:600; }
  header .status-dot{
    display:inline-block; width:6px; height:6px; border-radius:50%;
    background:var(--core); margin-right:6px;
    box-shadow:0 0 8px var(--core);
    animation: blink 2s infinite;
  }
  @keyframes blink{ 0%,100%{opacity:1} 50%{opacity:.3} }
  header .clock{ text-align:right; }

  main{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    position:relative; z-index:2;
  }

  #core-wrap{
    position:relative; width:min(62vw, 280px); height:min(62vw,280px);
    display:flex; align-items:center; justify-content:center;
    margin-bottom: 22px;
  }
  svg#core{ width:100%; height:100%; overflow:visible; }
  .ring{ fill:none; stroke:var(--core-dim); transform-origin:50% 50%; }
  .ring-active{ stroke:var(--core); filter:drop-shadow(0 0 6px var(--core)); }
  #ringA{ animation: spin 14s linear infinite; }
  #ringB{ animation: spin 9s linear infinite reverse; }
  #ringC{ animation: spin 22s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  #nucleus{
    fill: var(--core);
    filter: drop-shadow(0 0 14px var(--core)) drop-shadow(0 0 30px var(--core));
    transform-origin:50% 50%;
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{ transform:scale(1); opacity:.9 } 50%{ transform:scale(1.14); opacity:1 } }

  #app.state-listening #nucleus{ animation: pulse 0.9s ease-in-out infinite; fill:var(--amber); filter:drop-shadow(0 0 16px var(--amber)) drop-shadow(0 0 34px var(--amber)); }
  #app.state-listening .ring-active{ stroke:var(--amber); filter:drop-shadow(0 0 6px var(--amber)); }
  #app.state-thinking #ringA{ animation-duration: 1.6s; }
  #app.state-thinking #ringB{ animation-duration: 1s; }
  #app.state-thinking #ringC{ animation-duration: 2.2s; }
  #app.state-error #nucleus{ fill:var(--danger); filter:drop-shadow(0 0 16px var(--danger)); }

  #status-label{
    font-family:var(--mono); font-size:12px; letter-spacing:4px; text-transform:uppercase;
    color:var(--core); text-align:center; min-height:16px;
  }
  #app.state-listening #status-label{ color:var(--amber); }
  #app.state-error #status-label{ color:var(--danger); }

  #transcript{
    width:100%; max-width:480px; margin-top:18px;
    text-align:center; font-size:16px; line-height:1.5; color:var(--text-hi);
    min-height:70px; max-height:22vh; overflow-y:auto; padding:0 6px;
  }
  #transcript .you{ color:var(--text-lo); font-size:13px; font-family:var(--mono); margin-top:10px; }
  #transcript .jarvis{ color:var(--text-hi); }

  footer{
    z-index:2; display:flex; flex-direction:column; align-items:center; gap:14px;
    padding-top:10px;
  }
  #mic-btn{
    width:84px; height:84px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #0d222a, #04090c 70%);
    border:1.5px solid var(--core-dim);
    display:flex; align-items:center; justify-content:center;
    position:relative;
    transition: border-color .2s, box-shadow .2s, transform .15s;
    box-shadow:0 0 0 0 rgba(79,216,255,0);
  }
  #mic-btn:active{ transform:scale(.94); }
  #mic-btn.listening{
    border-color:var(--amber);
    box-shadow:0 0 0 10px rgba(255,180,84,.08), 0 0 24px rgba(255,180,84,.35);
  }
  #mic-btn svg{ width:30px; height:30px; }
  #mic-btn path, #mic-btn rect{ fill:var(--core); }
  #mic-btn.listening path, #mic-btn.listening rect{ fill:var(--amber); }

  #hint{
    font-family:var(--mono); font-size:10.5px; letter-spacing:1.5px;
    color:var(--text-lo); text-transform:uppercase; text-align:center;
  }

  #text-form{
    display:none; width:100%; max-width:420px;
    align-items:center; gap:10px;
  }
  #text-form.active{ display:flex; }
  #text-input{
    flex:1; background:#04090c; border:1.5px solid var(--core-dim);
    border-radius:22px; padding:12px 16px; color:var(--text-hi);
    font-family:var(--sans); font-size:15px; outline:none;
  }
  #text-input:focus{ border-color:var(--core); }
  #text-input::placeholder{ color:var(--text-lo); }
  #send-btn{
    width:44px; height:44px; border-radius:50%; flex-shrink:0;
    background:radial-gradient(circle at 35% 30%, #0d222a, #04090c 70%);
    border:1.5px solid var(--core-dim);
    display:flex; align-items:center; justify-content:center;
  }
  #send-btn:active{ transform:scale(.92); }
  #send-btn svg{ width:18px; height:18px; }
  #send-btn path{ fill:var(--core); }
</style>
</head>
<body>
<div id="grid"></div>
<div id="app" class="state-idle">
  <header>
    <div><span class="status-dot"></span><span class="brand">J.A.R.V.I.S.</span><br><span id="mode-label">SISTEMA EM ESPERA</span></div>
    <div class="clock" id="clock">00:00:00</div>
  </header>

  <main>
    <div id="core-wrap">
      <svg id="core" viewBox="0 0 200 200">
        <circle id="ringC" class="ring ring-active" cx="100" cy="100" r="92" stroke-width="1" stroke-dasharray="4 10"/>
        <circle id="ringA" class="ring ring-active" cx="100" cy="100" r="76" stroke-width="1.5" stroke-dasharray="2 6"/>
        <circle id="ringB" class="ring" cx="100" cy="100" r="60" stroke-width="1" stroke-dasharray="1 4"/>
        <circle id="nucleus" cx="100" cy="100" r="30"/>
      </svg>
    </div>
    <div id="status-label">PRONTO</div>
    <div id="transcript"></div>
  </main>

  <footer>
    <button id="mic-btn" aria-label="Falar com Jarvis">
      <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg>
    </button>

    <form id="text-form">
      <input id="text-input" type="text" placeholder="Toque e use o mic do teclado, ou digite" autocomplete="off" autocapitalize="sentences">
      <button id="send-btn" type="submit" aria-label="Enviar">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </form>

    <div id="hint">Toque e fale</div>
  </footer>
</div>

<script>
(function(){
  const app = document.getElementById('app');
  const micBtn = document.getElementById('mic-btn');
  const statusLabel = document.getElementById('status-label');
  const modeLabel = document.getElementById('mode-label');
  const transcript = document.getElementById('transcript');
  const clockEl = document.getElementById('clock');
  const hint = document.getElementById('hint');
  const textForm = document.getElementById('text-form');
  const textInput = document.getElementById('text-input');

  // clock
  function tick(){
    const d = new Date();
    clockEl.textContent = d.toLocaleTimeString('pt-BR', {hour12:false});
  }
  tick(); setInterval(tick, 1000);

  function setState(s, label){
    app.className = 'state-' + s;
    statusLabel.textContent = label;
    modeLabel.textContent = ({
      idle: 'SISTEMA EM ESPERA',
      listening: 'CAPTURANDO ÁUDIO',
      thinking: 'PROCESSANDO',
      speaking: 'RESPONDENDO',
      error: 'FALHA DE SISTEMA'
    })[s] || '';
  }

  function addLine(cls, text){
    const p = document.createElement('div');
    p.className = cls;
    p.textContent = text;
    transcript.appendChild(p);
    transcript.scrollTop = transcript.scrollHeight;
    return p;
  }

  // ---- Speech recognition setup ----
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognizing = false;
  let recognition = null;

  if (!SR) {
    // iOS Safari (and some others) don't support speech-to-text.
    // Fall back to a text field; replies are still spoken aloud (TTS works fine on iOS).
    micBtn.style.display = 'none';
    textForm.classList.add('active');
    hint.textContent = 'Toque no campo e use o microfone do teclado';

    textForm.addEventListener('submit', function(e){
      e.preventDefault();
      const val = textInput.value.trim();
      if (!val) return;
      addLine('you', '> ' + val);
      textInput.value = '';
      textInput.blur();
      handleQuery(val);
    });
  } else {
    recognition = new SR();
    recognition.lang = 'pt-BR';
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    recognition.onstart = function(){
      recognizing = true;
      micBtn.classList.add('listening');
      setState('listening', 'OUVINDO...');
    };

    recognition.onerror = function(e){
      recognizing = false;
      micBtn.classList.remove('listening');
      setState('error', 'ERRO: ' + (e.error || 'DESCONHECIDO'));
      setTimeout(()=> setState('idle','PRONTO'), 2200);
    };

    recognition.onend = function(){
      recognizing = false;
      micBtn.classList.remove('listening');
    };

    recognition.onresult = function(e){
      const said = e.results[0][0].transcript;
      addLine('you', '> ' + said);
      handleQuery(said);
    };
  }

  micBtn.addEventListener('click', function(){
    if (!SR) return;
    if (recognizing) { recognition.stop(); return; }

    if (!window.isSecureContext) {
      setState('error', 'ABRA VIA HTTP, NÃO ARQUIVO');
      addLine('jarvis', 'O microfone só funciona se a página for aberta por um endereço http:// ou https:// — abrir o arquivo direto (duplo clique) bloqueia o acesso ao microfone no navegador.');
      setTimeout(()=> setState('idle','PRONTO'), 4000);
      return;
    }

    // cancel any speech before listening
    window.speechSynthesis.cancel();
    try {
      recognition.start();
    } catch(e){
      if (e && e.name === 'InvalidStateError') return; // already started, ignore
      setState('error', 'ERRO AO INICIAR: ' + (e && e.message ? e.message : e));
      setTimeout(()=> setState('idle','PRONTO'), 3000);
    }
  });

  // ---- Text-to-speech ----
  let ttsUnlocked = false;
  function unlockTTS(){
    if (ttsUnlocked || !window.speechSynthesis) return;
    ttsUnlocked = true;
    // iOS Safari needs a speak() call to happen inside a real user gesture
    // before any later, async-triggered speak() will actually produce sound.
    const warm = new SpeechSynthesisUtterance(' ');
    warm.volume = 1;
    window.speechSynthesis.speak(warm);
  }
  document.body.addEventListener('touchstart', unlockTTS, {once:true, passive:true});
  document.body.addEventListener('click', unlockTTS, {once:true});

  function getVoicesAsync(){
    return new Promise((resolve)=>{
      let voices = window.speechSynthesis.getVoices();
      if (voices && voices.length) { resolve(voices); return; }
      const onChange = () => {
        voices = window.speechSynthesis.getVoices();
        if (voices && voices.length) {
          window.speechSynthesis.removeEventListener('voiceschanged', onChange);
          resolve(voices);
        }
      };
      window.speechSynthesis.addEventListener('voiceschanged', onChange);
      // fallback so we never hang forever if the event never fires
      setTimeout(() => resolve(window.speechSynthesis.getVoices() || []), 800);
    });
  }

  async function speak(text){
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const voices = await getVoicesAsync();
    return new Promise((resolve)=>{
      // small delay: speaking immediately after cancel() is unreliable on iOS
      setTimeout(()=>{
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'pt-BR';
        u.rate = 0.96;
        u.pitch = 0.72;
        u.volume = 1;
        const ptVoices = voices.filter(v => v.lang && v.lang.toLowerCase().startsWith('pt'));
        const maleNames = ['felipe','daniel','diego','ricardo','luiz','pedro','male','masculin'];
        const maleVoice = ptVoices.find(v => maleNames.some(n => v.name.toLowerCase().includes(n)));
        const chosenVoice = maleVoice || ptVoices[0];
        if (chosenVoice) u.voice = chosenVoice;
        u.onstart = ()=> setState('speaking', 'RESPONDENDO');
        u.onend = ()=> { setState('idle','PRONTO'); resolve(); };
        u.onerror = ()=> { setState('idle','PRONTO'); resolve(); };
        window.speechSynthesis.speak(u);
        // iOS occasionally pauses synthesis right after starting; nudge it awake
        setTimeout(()=>{ if (window.speechSynthesis.paused) window.speechSynthesis.resume(); }, 150);
      }, 60);
    });
  }

  // ---- Claude API call ----
  const SYSTEM_PROMPT = "Você é JARVIS, o assistente de voz pessoal de um usuário, no estilo do assistente dos filmes do Homem de Ferro. Responda sempre em português do Brasil, de forma curta (1 a 3 frases), natural para ser falada em voz alta. Sem markdown, sem listas, sem emojis, sem asteriscos. Tom calmo, confiante, levemente formal e um pouco theatral — como um mordomo britânico hiper-competente. Quando fizer sentido, feche a resposta com uma confirmação curta no mesmo estilo (variando entre frases como 'Como desejar', 'Considerado feito', 'Sistemas operando normalmente', 'Ao seu dispor'), mas não force isso em toda resposta — só quando soar natural, por exemplo após uma confirmação de tarefa ou status.";

  let history = [];

  async function handleQuery(text){
    setState('thinking', 'PROCESSANDO...');
    history.push({role:'user', content:text});
    if (history.length > 12) history = history.slice(-12);

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 300,
          system: SYSTEM_PROMPT,
          messages: history
        })
      });
      const data = await response.json();
      let reply = "Não consegui processar essa solicitação.";
      if (data && data.content) {
        reply = data.content.map(b => b.type === 'text' ? b.text : '').join(' ').trim() || reply;
      }
      history.push({role:'assistant', content:reply});
      addLine('jarvis', reply);
      await speak(reply);
    } catch(err){
      setState('error', 'ERRO DE CONEXÃO');
      addLine('jarvis', 'Falha na conexão com o núcleo de processamento.');
      setTimeout(()=> setState('idle','PRONTO'), 2200);
    }
  }

  // wake voices (some browsers need a nudge)
  if (window.speechSynthesis) {
    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
  }

})();
</script>
</body>
</html>
